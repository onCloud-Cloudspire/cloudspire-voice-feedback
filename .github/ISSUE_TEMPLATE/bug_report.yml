name: Bug Report
description: Report a bug or something that isn't working as expected
title: "[Bug] "
body:
  - type: dropdown
    id: product
    attributes:
      label: Area
      description: Which area of Cloudspire Voice is this about?
      options:
        - PBX Admin (tenants, extensions, DIDs)
        - Call Routing (IVRs, hunt groups, call flows)
        - Call Center (queues, agents, dashboards)
        - Phone Provisioning
        - SMS / MMS Messaging
        - CNAM / Caller ID
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this issue?
      options:
        - Critical — System down, data loss, or security issue
        - High — Major feature broken, no workaround
        - Medium — Feature partially broken, workaround exists
        - Low — Minor cosmetic or UI issue
    validations:
      required: true

  - type: input
    id: screen
    attributes:
      label: Screen / Page
      description: Which screen, tab, or page were you on?
      placeholder: "e.g. Extensions tab, DID edit form, IVR key routing"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Enter '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Device
      description: What browser and device were you using?
      placeholder: "e.g. Chrome 120 on Windows, Safari on iPhone 15"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop any screenshots that help illustrate the issue
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other details, error messages, or observations
    validations:
      required: false
