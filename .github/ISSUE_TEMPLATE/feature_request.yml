name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
body:
  - type: dropdown
    id: product
    attributes:
      label: Area
      description: Which area of Cloudspire Voice is this about?
      options:
        - PBX Admin (tenants, extensions, DIDs)
        - Call Routing (IVRs, hunt groups, call flows)
        - Call Center (queues, agents, dashboards)
        - Phone Provisioning
        - SMS / MMS Messaging
        - CNAM / Caller ID
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve, or why would this be useful?
      placeholder: "I'm frustrated when... / It would save time if... / Customers are asking for..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches or workarounds you've thought of?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to you?
      options:
        - Nice to have
        - Important — would significantly improve workflow
        - Critical — blocking a business need
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, examples from other products, or any other details
    validations:
      required: false
